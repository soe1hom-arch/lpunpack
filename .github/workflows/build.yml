name: build

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go build -o /dev/null .
      - run: go vet ./...

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          name="lpunpack-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"
          go build -ldflags="-s -w" -o "$name" .
          echo "binary=$name" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: lpunpack-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lpunpack-*

  create-release:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: lpunpack-*
          merge-multiple: true
      - name: Checksums
        run: sha256sum lpunpack-* > lpunpack_sha256sums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            lpunpack-*
            lpunpack_sha256sums.txt
          generate_release_notes: true
